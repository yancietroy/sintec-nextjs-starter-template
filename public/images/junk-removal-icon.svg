<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Truck body -->
  <rect x="10" y="50" width="60" height="35" rx="4" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Truck cab -->
  <path d="M70 55 L90 55 L100 70 L100 85 L70 85 Z" fill="#2d2d2d" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Windshield -->
  <path d="M74 58 L87 58 L95 70 L74 70 Z" fill="#a8d8ea" stroke="#1a1a1a" stroke-width="1"/>
  <!-- Junk items in truck bed -->
  <rect x="15" y="35" width="18" height="18" rx="2" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <rect x="35" y="30" width="15" height="23" rx="2" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
  <circle cx="58" cy="42" r="10" fill="#6366f1" stroke="#4f46e5" stroke-width="1.5"/>
  <rect x="22" y="25" width="12" height="12" rx="1" fill="#ef4444" stroke="#dc2626" stroke-width="1.5" transform="rotate(-15 28 31)"/>
  <!-- Wheels -->
  <circle cx="30" cy="90" r="8" fill="#374151" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="30" cy="90" r="3" fill="#9ca3af"/>
  <circle cx="88" cy="90" r="8" fill="#374151" stroke="#1a1a1a" stroke-width="2"/>
  <circle cx="88" cy="90" r="3" fill="#9ca3af"/>
  <!-- Arrow indicating removal -->
  <path d="M52 15 L68 15 L68 10 L80 20 L68 30 L68 25 L52 25 Z" fill="#2d2d2d" opacity="0.7"/>
</svg>