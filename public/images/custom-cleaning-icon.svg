<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Clipboard -->
  <rect x="25" y="25" width="50" height="70" rx="4" fill="#f3f4f6" stroke="#2d2d2d" stroke-width="2"/>
  <!-- Clipboard clip -->
  <rect x="40" y="18" width="20" height="14" rx="3" fill="#374151" stroke="#1a1a1a" stroke-width="2"/>
  <rect x="44" y="22" width="12" height="6" rx="2" fill="#9ca3af"/>
  <!-- Checklist items -->
  <!-- Item 1 - checked -->
  <rect x="32" y="38" width="10" height="10" rx="2" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
  <path d="M34 43 L36 46 L40 40" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="46" y="40" width="22" height="3" rx="1.5" fill="#d1d5db"/>
  <rect x="46" y="45" width="14" height="2" rx="1" fill="#e5e7eb"/>
  <!-- Item 2 - checked -->
  <rect x="32" y="54" width="10" height="10" rx="2" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
  <path d="M34 59 L36 62 L40 56" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="46" y="56" width="18" height="3" rx="1.5" fill="#d1d5db"/>
  <rect x="46" y="61" width="12" height="2" rx="1" fill="#e5e7eb"/>
  <!-- Item 3 - unchecked -->
  <rect x="32" y="70" width="10" height="10" rx="2" fill="white" stroke="#d1d5db" stroke-width="1.5"/>
  <rect x="46" y="72" width="20" height="3" rx="1.5" fill="#d1d5db"/>
  <rect x="46" y="77" width="16" height="2" rx="1" fill="#e5e7eb"/>
  <!-- Gear/settings icon -->
  <circle cx="90" cy="45" r="16" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <circle cx="90" cy="45" r="6" fill="#f3f4f6" stroke="#2563eb" stroke-width="1.5"/>
  <!-- Gear teeth -->
  <rect x="87" y="26" width="6" height="8" rx="2" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
  <rect x="87" y="58" width="6" height="8" rx="2" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
  <rect x="71" y="42" width="8" height="6" rx="2" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
  <rect x="101" y="42" width="8" height="6" rx="2" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
  <!-- Calendar icon -->
  <rect x="80" y="72" width="28" height="24" rx="3" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <rect x="80" y="72" width="28" height="8" rx="3" fill="#d97706" stroke="#d97706" stroke-width="1"/>
  <circle cx="88" cy="88" r="2" fill="white"/>
  <circle cx="100" cy="88" r="2" fill="white"/>
  <line x1="84" y1="69" x2="84" y2="74" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <line x1="104" y1="69" x2="104" y2="74" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
</svg>